name: paperplot-skills

'on':
  push:
    branches: [main, master]
    paths:
      - "paperplot-skills/**"
      - "R/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - ".github/workflows/paperplot-skills.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "paperplot-skills/**"
      - "R/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - ".github/workflows/paperplot-skills.yaml"
  workflow_dispatch:

jobs:
  validate-paperplot-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::patchwork

      - name: Validate skill structure
        run: Rscript paperplot-skills/scripts/validate-skill.R

      - name: Smoke test R templates
        run: Rscript paperplot-skills/scripts/smoke-test-templates.R
        env:
          PAPERPLOTR_SMOKE_BASE_DEVICES: "true"
